kind = "web"
previewPath = "/"
title = "App"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23863
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/app", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/app", "run", "start"]

[services.production.run.env]
PORT = "23863"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"

[services.env]
PORT = "23863"
